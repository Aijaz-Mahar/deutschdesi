<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level A1 Curriculum | Deutsch Desi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: #f8f9fa; color: #2d3436; overflow: hidden; }
        
        .main-header {
            background: linear-gradient(135deg, #2d3436 0%, #000000 100%);
            color: #FFCC00; padding: 25px 5%; display: flex; align-items: center; border-bottom: 4px solid #FFCC00;
        }
        .logo { width: 50px; height: 50px; margin-right: 20px; display: flex; align-items: center; justify-content: center; color: white; border: 2px solid #FFCC00; font-weight: bold; }
        .banner-text h1 { font-size: 2rem; letter-spacing: 2px; }

        .layout-wrapper { display: flex; height: calc(100vh - 170px); max-width: 1400px; margin: 20px auto; padding: 0 20px; gap: 20px; }

        .sidebar { flex: 1; background: #2d3436; color: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .sidebar h3 { color: #FFCC00; margin-bottom: 20px; font-size: 1.1rem; border-bottom: 1px solid #444; padding-bottom: 10px; text-transform: uppercase; }
        .lesson-list { list-style: none; }
        .lesson-list li { margin-bottom: 12px; }
        .lesson-list a { color: #ddd; text-decoration: none; transition: 0.3s; font-size: 0.95rem; display: block; cursor: pointer; }
        .lesson-list a:hover, .lesson-list a.active { color: #FFCC00; font-weight: bold; transform: translateX(5px); }

        /* The Content Window */
        .content-area { flex: 4; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        #content-frame { width: 100%; height: 100%; border: none; }

        .footer { background-color: #2d3436; color: white; padding: 15px 0; position: fixed; bottom: 0; width: 100%; border-top: 2px solid #FFCC00; }
        .footer-content { display: flex; justify-content: space-around; align-items: center; font-size: 0.85rem; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo">DD</div>
        <div class="banner-text">
            <h1>Deutsch Desi</h1>
            <p>Level A1: Master German Foundation</p>
        </div>
    </header>

    <div class="layout-wrapper">
        <aside class="sidebar">
            <h3>Course Content</h3>
            <ul class="lesson-list">
                <li><a onclick="loadPage('intro.html')" class="active">Introduction</a></li>
                <li><a onclick="loadPage('greetings.html')">Lesson 1: Greetings</a></li>
                <li><a onclick="loadPage('alphabet.html')">Lesson 2: Alphabet A-Z</a></li>
                 <li><a onclick="loadPage('sounds.html')">Lesson 2: Letter Combination & Sounds</a></li>
            </ul>
        </aside>

        <main class="content-area">
            <!-- This Frame will show the separate lesson files -->
            <iframe src="intro.html" id="content-frame"></iframe>
        </main>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>Contact: <strong>info.emahar.com</strong></p>
            <p>&copy; 2026 DeutschDesi.emahar.com</p>
            <p>Teacher: <strong>Aijaz Mahar</strong></p>
        </div>
    </footer>

    <script>
        function loadPage(pageUrl) {
            document.getElementById('content-frame').src = pageUrl;
            
            const links = document.querySelectorAll('.lesson-list a');
            links.forEach(link => link.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
