<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; color: #2d3436; line-height: 1.6; }
        h2 { border-left: 5px solid #FFCC00; padding-left: 15px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #2d3436; color: #FFCC00; }
    </style>
</head>
<body>
    <h2>Lesson 1: German Greetings (Begrüßungen)</h2>
    <p>In German, greetings change based on the time of day.</p>
    <table>
        <thead><tr><th>German</th><th>English</th><th>Urdu</th><th>Hindi</th></tr></thead>
        <tbody>
            <tr><td>Hallo</td><td>Hello</td><td>ہیلو</td><td>नमस्ते</td></tr>
            <tr><td>Guten Morgen</td><td>Good Morning</td><td>صبح بخیر</td><td>शुभ प्रभात</td></tr>
            <tr><td>Guten Tag</td><td>Good Day</td><td>آپ کا دن اچھا گزرے</td><td>शुभ दिन</td></tr>
            <tr><td>Gute Nacht</td><td>Good Night</td><td>شب بخیر</td><td>शुभ रात्रि</td></tr>
        </tbody>
    </table>
</body>
</html>
